spring:
  application:
    name: hh-process
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: ${KAFKA_GROUP_ID:hh-process-default}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ${POSTGRES_SCHEMA}
        transaction:
          coordinator_class: jta
    open-in-view: false
  flyway:
    enabled: true
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${POSTGRES_SCHEMA}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: ${POSTGRES_SCHEMA}
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

narayana:
  log-dir: ${NARAYANA_LOG_DIR:${user.dir}/transaction-logs}
  default-timeout: ${NARAYANA_DEFAULT_TIMEOUT:60}
  node-identifier: ${NARAYANA_NODE_IDENTIFIER:hh-process}
  shorten-node-identifier-if-necessary: true

app:
  role: ${APP_ROLE:api}
  instance-name: ${APP_INSTANCE_NAME:${NARAYANA_NODE_IDENTIFIER:hh-process}}
  openapi:
    title: @project.name@
    version: @project.version@
    description: @project.description@
  security:
    users-xml-path: ${APP_SECURITY_USERS_XML:${user.dir}/data/users.xml}

  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000}
  kafka:
    topics:
      application-submitted: ${APP_TOPIC_APPLICATION_SUBMITTED:application.submitted}
      application-screened: ${APP_TOPIC_APPLICATION_SCREENED:application.screened}
  eis:
    # Обязателен для APP_ROLE=api (модуль Odoo hh_process_eis или другой HTTP EIS). In-memory EIS в приложении нет.
    remote-base-url: ${APP_EIS_REMOTE_BASE_URL:}
    # Опционально: X-API-Key к Odoo/моку
    api-key: ${APP_EIS_API_KEY:}
    export-interval-ms: ${APP_EIS_EXPORT_INTERVAL_MS:5000}
    export-initial-delay-ms: ${APP_EIS_EXPORT_INITIAL_DELAY_MS:5000}
  workers:
    screening-enabled: ${APP_SCREENING_ENABLED:true}
  schedule:
    debug:
      fail-on-reserve: ${APP_SCHEDULE_DEBUG_FAIL_ON_RESERVE:false}

  camunda:
    enabled: ${APP_CAMUNDA_ENABLED:false}
    base-url: ${APP_CAMUNDA_BASE_URL:http://localhost:8080/engine-rest}
    username: ${APP_CAMUNDA_USERNAME:}
    password: ${APP_CAMUNDA_PASSWORD:}
    worker-id: ${APP_CAMUNDA_WORKER_ID:${APP_INSTANCE_NAME:hh-process-api}}
    process-key: ${APP_CAMUNDA_PROCESS_KEY:candidate-application-process}
    vacancy-process-key: ${APP_CAMUNDA_VACANCY_PROCESS_KEY:vacancy-management-process}
    cancel-interview-process-key: ${APP_CAMUNDA_CANCEL_INTERVIEW_PROCESS_KEY:cancel-interview-process}
    screening-message-name: ${APP_CAMUNDA_SCREENING_MESSAGE_NAME:ScreeningCompleted}
    recruiter-review-task-key: ${APP_CAMUNDA_RECRUITER_REVIEW_TASK_KEY:recruiter-review}
    candidate-response-task-key: ${APP_CAMUNDA_CANDIDATE_RESPONSE_TASK_KEY:candidate-response}
    max-tasks: ${APP_CAMUNDA_MAX_TASKS:8}
    lock-duration-ms: ${APP_CAMUNDA_LOCK_DURATION_MS:30000}
    fetch-interval-ms: ${APP_CAMUNDA_FETCH_INTERVAL_MS:5000}
    initial-delay-ms: ${APP_CAMUNDA_INITIAL_DELAY_MS:5000}
    failure-retries: ${APP_CAMUNDA_FAILURE_RETRIES:3}
    failure-retry-timeout-ms: ${APP_CAMUNDA_FAILURE_RETRY_TIMEOUT_MS:15000}
  timeout:
    check-interval-ms: ${APP_TIMEOUT_CHECK_INTERVAL_MS:60000}
    initial-delay-ms: ${APP_TIMEOUT_INITIAL_DELAY_MS:30000}
    debug:
      disable-notifications: ${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:false}


logging:
  level:
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.engine.transaction.internal.TransactionImpl: DEBUG
    com.arjuna: DEBUG
    com.arjuna.ats: DEBUG
    org.jboss.narayana: DEBUG
    ru.itmo.hhprocess.service.TimeoutService: DEBUG
    ru.itmo.hhprocess.service.TimeoutBatchProcessor: DEBUG
    ru.itmo.hhprocess.service.ScheduleService: DEBUG
    ru.itmo.hhprocess.controller.AdminController: DEBUG
