spring:
  application:
    name: hh-process
  jta:
    enabled: ${SPRING_JTA_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ${POSTGRES_SCHEMA}
        transaction:
          coordinator_class: ${HIBERNATE_TRANSACTION_COORDINATOR_CLASS:jta}
    open-in-view: false
  flyway:
    enabled: true
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${POSTGRES_SCHEMA}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: ${POSTGRES_SCHEMA}
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

narayana:
  log-dir: ${NARAYANA_LOG_DIR:${user.dir}/transaction-logs}
  default-timeout: ${NARAYANA_DEFAULT_TIMEOUT:60}
  node-identifier: ${NARAYANA_NODE_IDENTIFIER:hh-process}
  shorten-node-identifier-if-necessary: true

app:
  openapi:
    title: "@project.name@"
    version: "@project.version@"
    description: "@project.description@"
  security:
    users-xml-path: ${APP_SECURITY_USERS_XML:${user.dir}/data/users.xml}

  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000}
  timeout:
    local-scheduler-enabled: ${APP_TIMEOUT_LOCAL_SCHEDULER_ENABLED:false}
    debug:
      disable-notifications: ${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:false}

  camunda:
    enabled: ${CAMUNDA_ENABLED:true}
    base-url: ${CAMUNDA_BASE_URL:http://camunda:8080/engine-rest}
    username: ${CAMUNDA_USERNAME:}
    password: ${CAMUNDA_PASSWORD:}
    fail-on-error: ${CAMUNDA_FAIL_ON_ERROR:false}
    deployment-name: ${CAMUNDA_DEPLOYMENT_NAME:hh-process-bpmn}
    application-process-key: hhApplicationProcess
    vacancy-process-key: hhVacancyProcess
    timeout-scheduler-process-key: hhTimeoutSchedulerProcess
    admin-interview-reset-process-key: hhAdminInterviewResetProcess
    identity-sync-initial-password: ${CAMUNDA_IDENTITY_SYNC_INITIAL_PASSWORD:camunda}
    worker:
      enabled: ${CAMUNDA_WORKER_ENABLED:true}
      id: ${CAMUNDA_WORKER_ID:hh-process-worker}
      max-tasks: ${CAMUNDA_WORKER_MAX_TASKS:10}
      lock-duration-ms: ${CAMUNDA_WORKER_LOCK_DURATION_MS:30000}
      async-response-timeout-ms: ${CAMUNDA_WORKER_ASYNC_RESPONSE_TIMEOUT_MS:2000}
      poll-interval-ms: ${CAMUNDA_WORKER_POLL_INTERVAL_MS:3000}


logging:
  level:
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.engine.transaction.internal.TransactionImpl: DEBUG
    com.arjuna: DEBUG
    com.arjuna.ats: DEBUG
    org.jboss.narayana: DEBUG
    ru.itmo.hhprocess.service.TimeoutService: DEBUG
    ru.itmo.hhprocess.service.TimeoutBatchProcessor: DEBUG
    ru.itmo.hhprocess.service.ScheduleService: DEBUG
    ru.itmo.hhprocess.controller.AdminController: DEBUG
