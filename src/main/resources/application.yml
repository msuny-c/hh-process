spring:
  application:
    name: hh-process
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${POSTGRES_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: s408194
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    schemas: ${POSTGRES_SCHEMA}
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}
