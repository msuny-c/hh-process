services:
  postgres:
    image: postgres:16-alpine
    container_name: hh-process-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hh_process"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hh-process-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
volumes:
  postgres_data:
