name: Build & Deploy blps

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.vars.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache Maven build output
        id: cache-build
        uses: actions/cache@v4
        with:
          path: target
          key: maven-build-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}-${{ hashFiles('**/*.java') }}

      - name: Build JAR
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: mvn -B clean package -DskipTests

      - name: Detect JAR name
        id: vars
        run: |
          JAR=$(ls -1 target/*-SNAPSHOT.jar target/*.jar 2>/dev/null | head -n1)
          test -n "$JAR"
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/${{ steps.vars.outputs.jar_name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/appctl.sh
          sparse-checkout-cone-mode: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifact

      - name: Create app.env from secrets/vars
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          python << 'PYTHON'
          import json
          import os

          secrets = json.loads(os.environ.get('ALL_SECRETS', '{}'))
          vars = json.loads(os.environ.get('ALL_VARS', '{}'))

          with open('app.env', 'w') as f:
              for key, value in {**secrets, **vars}.items():
                  if key not in ['SSH_KEY', 'SSH_HOST', 'SSH_PORT', 'SSH_USER', 'github_token']:
                      if value is not None:
                          value = str(value).strip()
                      f.write(f'{key}={value}\n')
          PYTHON

          echo "Created app.env with $(wc -l < app.env) variables"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload bundle to server
        run: |
          APP_DIR="~/apps/blps"
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/app.jar"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            app.env \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/app.env"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            infra/appctl.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/appctl.sh"

          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"

      - name: Restart service on server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"

      - name: Healthcheck
        run: |
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "i=0; while [ \$i -lt 60 ]; do nc -z 127.0.0.1 ${PORT} && exit 0; sleep 1; i=\$((i+1)); done; echo 'Port ${PORT} not open'; exit 1"

      - name: Fetch app.log from server
        if: always()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=10 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cat ~/apps/blps/app.log 2>/dev/null || echo '(app.log not found or empty)'" > app.log 2>/dev/null || true
          test -f app.log || echo "app.log not available" > app.log

      - name: Upload app.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-${{ github.run_id }}
          path: app.log
