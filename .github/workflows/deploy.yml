name: Build & Deploy blps

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.vars.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Detect JAR name
        id: vars
        run: |
          JAR=$(ls -1 target/*-SNAPSHOT.jar target/*.jar 2>/dev/null | head -n1)
          test -n "$JAR"
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/${{ steps.vars.outputs.jar_name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/appctl.sh
          sparse-checkout-cone-mode: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifact

      - name: Create app.env from secrets/vars
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          python << 'PYTHON'
          import json
          import os

          secrets = json.loads(os.environ.get('ALL_SECRETS', '{}'))
          vars = json.loads(os.environ.get('ALL_VARS', '{}'))

          with open('app.env', 'w') as f:
              for key, value in {**secrets, **vars}.items():
                  if key not in ['SSH_KEY', 'SSH_HOST', 'SSH_PORT', 'SSH_USER', 'github_token']:
                      if value is not None:
                          value = str(value).strip()
                      f.write(f'{key}={value}\n')
          PYTHON

          echo "Created app.env with $(wc -l < app.env) variables"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload bundle to server
        run: |
          APP_DIR="~/apps/blps"
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/app.jar"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            app.env \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/app.env"

          scp -P "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            infra/appctl.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${APP_DIR}/appctl.sh"

          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"

      - name: Restart service on server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"

      - name: Healthcheck
        run: |
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "i=0; while [ \$i -lt 60 ]; do nc -z 127.0.0.1 ${PORT} && exit 0; sleep 1; i=\$((i+1)); done; echo 'Port ${PORT} not open'; exit 1"

      - name: Fetch app.log from server
        if: always()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=10 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cat ~/apps/blps/app.log 2>/dev/null || echo '(app.log not found or empty)'" > app.log 2>/dev/null || true
          test -f app.log || echo "app.log not available" > app.log

      - name: Upload app.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-${{ github.run_id }}
          path: app.log

  notify-telegram-on-failure:
    needs: [build, deploy]
    if: failure() && (needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Download app.log artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: app-log-${{ github.run_id }}

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_IDS" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_IDS not set, skipping notification"
            exit 0
          fi
          # Обрезка app.log до 2MB (лимит Telegram), один раз до рассылки
          if [ -f app.log ] && [ -s app.log ] && [ $(wc -c < app.log) -gt 2000000 ]; then
            tail -c 2000000 app.log > app_truncated.log && mv app_truncated.log app.log
          fi
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          MSG="❌ *Деплой наебнулся:* \`$REPO\`
          Ветка: \`$BRANCH\`
          Коммит: \`${COMMIT:0:7}\`
          [Смотреть запуск]($RUN_URL)"
          MSG_JSON=$(echo "$MSG" | jq -Rs .)
          echo "$TELEGRAM_CHAT_IDS" | tr ',' '\n' | while IFS= read -r raw; do
            raw=$(echo "$raw" | tr -d '[:space:]')
            [ -z "$raw" ] && continue
            if echo "$raw" | grep -qE '^-?[0-9]+$'; then
              CHAT_ID="$raw"
            else
              [ "${raw#@}" = "$raw" ] && CHAT_ID="@$raw" || CHAT_ID="$raw"
            fi
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${MSG_JSON},\"parse_mode\":\"Markdown\",\"disable_web_page_preview\":true}" \
              || true
            if [ -f app.log ] && [ -s app.log ]; then
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${CHAT_ID}" \
                -F "document=@app.log" \
                -F "caption=app.log" \
                || true
            fi
          done

  notify-telegram-on-success:
    needs: [build, deploy]
    if: success() && (needs.deploy.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_IDS" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_IDS not set, skipping notification"
            exit 0
          fi
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          MSG="✅ *Деплой прошел:* \`$REPO\`
          Ветка: \`$BRANCH\`
          Коммит: \`${COMMIT:0:7}\`
          [Смотреть запуск]($RUN_URL)"
          MSG_JSON=$(echo "$MSG" | jq -Rs .)
          echo "$TELEGRAM_CHAT_IDS" | tr ',' '\n' | while IFS= read -r raw; do
            raw=$(echo "$raw" | tr -d '[:space:]')
            [ -z "$raw" ] && continue
            if echo "$raw" | grep -qE '^-?[0-9]+$'; then
              CHAT_ID="$raw"
            else
              [ "${raw#@}" = "$raw" ] && CHAT_ID="@$raw" || CHAT_ID="$raw"
            fi
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${MSG_JSON},\"parse_mode\":\"Markdown\",\"disable_web_page_preview\":true}" \
              || true
          done
