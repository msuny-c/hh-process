name: Build, Test & Deploy blps

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Explicit permissions: artifact download in deploy needs actions: read (some orgs default to restricted).
permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_SCHEMA: public
  SERVER_PORT: 8080
  NARAYANA_LOG_DIR: ./transaction-logs
  NARAYANA_NODE_IDENTIFIER: hh-process-ci
  APP_SECURITY_USERS_XML: ./data/users.xml
  APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS: true
  TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS: 1

# Repository variable CI_SKIP_TESTS: set to "true" or "1" to skip the test job (build and later jobs still run).
jobs:
  test:
    if: ${{ vars.CI_SKIP_TESTS != 'true' && vars.CI_SKIP_TESTS != '1' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for API tests
        run: python -m pip install --upgrade pip requests "psycopg[binary]"

      - name: Start PostgreSQL with prepared transactions enabled
        run: |
          docker run -d \
            --name hh-process-ci-postgres \
            -e POSTGRES_DB=${POSTGRES_DB} \
            -e POSTGRES_USER=${POSTGRES_USER} \
            -e POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
            -p ${POSTGRES_PORT}:5432 \
            --health-cmd="pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=20 \
            postgres:16-alpine \
            postgres -c max_prepared_transactions=100

      - name: Wait for PostgreSQL healthcheck
        run: |
          set -eu
          echo "## PostgreSQL — waiting for healthy (max ~120s)"
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' hh-process-ci-postgres 2>/dev/null || echo '"starting"')
            if [ "$STATUS" = '"healthy"' ]; then
              echo "PostgreSQL OK (attempt ${i}/60)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 15)) -eq 0 ]; then
              echo "  ... status ${STATUS} (${i}/60)"
            fi
            sleep 2
          done
          echo "::error::PostgreSQL did not become healthy in time"
          docker logs hh-process-ci-postgres 2>&1 | tail -n 80 || true
          exit 1

      # App expects Kafka (listeners + producer); default bootstrap is kafka:9092 — not resolvable on the runner.
      - name: Start Zookeeper and Kafka (CI)
        run: |
          set -eu
          echo "## CI: Zookeeper + Kafka (Docker) for integration tests"
          docker network create hh-process-ci-net 2>/dev/null || true
          docker run -d \
            --name hh-process-ci-zookeeper \
            --network hh-process-ci-net \
            -e ZOOKEEPER_CLIENT_PORT=2181 \
            -e ZOOKEEPER_TICK_TIME=2000 \
            confluentinc/cp-zookeeper:7.6.1
          echo "Healthcheck: waiting for Zookeeper (2181, up to ~80s)..."
          zk_ok=0
          for i in $(seq 1 40); do
            if docker exec hh-process-ci-zookeeper bash -c "echo srvr | nc -w 2 localhost 2181 | grep -q Mode" 2>/dev/null; then
              echo "Zookeeper OK (${i}/40, ~$((i * 2))s)."
              zk_ok=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 10)) -eq 0 ]; then
              echo "  ... Zookeeper still starting (${i}/40)"
            fi
            sleep 2
          done
          if [ "$zk_ok" -ne 1 ]; then
            echo "Zookeeper healthcheck failed." >&2
            docker logs hh-process-ci-zookeeper || true
            exit 1
          fi
          docker run -d \
            --name hh-process-ci-kafka \
            --network hh-process-ci-net \
            -p 29092:29092 \
            -e KAFKA_BROKER_ID=1 \
            -e KAFKA_ZOOKEEPER_CONNECT=hh-process-ci-zookeeper:2181 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://hh-process-ci-kafka:9092,PLAINTEXT_HOST://localhost:29092 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092 \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_AUTO_CREATE_TOPICS_ENABLE=true \
            confluentinc/cp-kafka:7.6.1
          echo "Healthcheck: waiting for Kafka broker API (localhost:9092 in container, up to ~120s)..."
          for i in $(seq 1 60); do
            if docker exec hh-process-ci-kafka kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1; then
              echo "Kafka OK: broker API ready (${i}/60, ~$((i * 2))s)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 10)) -eq 0 ]; then
              echo "  ... Kafka still starting (${i}/60)"
            fi
            sleep 2
          done
          echo "Kafka healthcheck failed: broker did not respond in time." >&2
          docker logs hh-process-ci-kafka || true
          exit 1

      - name: Build application
        run: mvn -B clean package -DskipTests

      - name: Start application
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:29092
        run: |
          mkdir -p "$NARAYANA_LOG_DIR" "$(dirname "$APP_SECURITY_USERS_XML")"
          nohup java -Dnarayana.log-dir="$NARAYANA_LOG_DIR" -Dapp.security.users-xml-path="$APP_SECURITY_USERS_XML" -jar target/*.jar > app-ci.log 2>&1 &
          echo $! > app.pid

      - name: Wait for healthcheck
        run: |
          set -eu
          echo "## Application — /actuator/health (max ~120s)"
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:8080/actuator/health; then
              echo "Application OK (attempt ${i}/60)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 15)) -eq 0 ]; then
              echo "  ... still starting (${i}/60)"
            fi
            sleep 2
          done
          echo "::error::Application did not become healthy — see app-ci.log artifact"
          tail -n 50 app-ci.log 2>/dev/null || true
          exit 1

      - name: Run API tests from test/
        run: |
          echo "APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS}"
          echo "TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS}"
          python test/test.py
          python test/test_composite_transactions.py
          python test/test_security_validation.py
          python test/test_access_matrix.py
          python test/test_transaction_atomicity.py
          python test/test_business_rules.py
          python test/test_timeout_job_db_fixture.py


      - name: Upload PostgreSQL CI log
        if: always()
        run: docker logs hh-process-ci-postgres > postgres-ci.log 2>&1 || true

      - name: Upload CI app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-app-log-${{ github.run_id }}
          path: app-ci.log

      - name: Upload PostgreSQL CI log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-postgres-log-${{ github.run_id }}
          path: postgres-ci.log

  build:
    needs: test
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.vars.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: |
          echo "## Maven package (skip unit tests)"
          mvn -B clean package -DskipTests

      - name: Detect JAR name
        id: vars
        run: |
          JAR=$(ls -1 target/*-SNAPSHOT.jar target/*.jar 2>/dev/null | head -n1)
          test -n "$JAR"
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/${{ steps.vars.outputs.jar_name }}

  deploy:
    needs: build
    # always() is required: implicit success() is false if *any* job was skipped (e.g. test when CI_SKIP_TESTS),
    # even when build succeeded — without always(), deploy never starts.
    if: ${{ always() && !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      # Prefer repository secrets; fall back to Actions variables (same names: SSH_KEY, SSH_HOST, …).
      SSH_KEY: ${{ secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/appctl.sh
            infra/ci/render_worker_env.py
            infra/stack/install-kafka-kraft.sh
            infra/stack/kafka-ctl.sh
            infra/stack/kafka-ui-ctl.sh
            test
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for deployed API tests
        run: python -m pip install --upgrade pip requests

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifact

      - name: Prepare SSH
        run: |
          set -eu
          echo "## SSH — stack host ${{ env.SSH_USER }}@${{ env.SSH_HOST }} (port ${{ env.SSH_PORT }})"
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH ready."

      # Native Kafka (KRaft) on the same host as the API — no Docker. Set vars.SKIP_NATIVE_STACK=true to skip.
      - name: Install and start Kafka (KRaft) on stack host
        if: ${{ vars.SKIP_NATIVE_STACK != 'true' }}
        run: |
          set -eu
          echo "## Kafka (KRaft) — install, start broker, health"
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "${STACK_HOST}" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          RUSER="${{ env.SSH_USER }}"
          RHOST="${{ env.SSH_HOST }}"
          RPORT="${{ env.SSH_PORT }}"
          echo "STACK_HOST=${STACK_HOST} (advertised listener for clients)"
          ssh -p "$RPORT" -i ~/.ssh/id_key "${RUSER}@${RHOST}" 'mkdir -p "$HOME/hh-process/stack"'
          scp -P "$RPORT" -i ~/.ssh/id_key \
            infra/stack/install-kafka-kraft.sh \
            infra/stack/kafka-ctl.sh \
            infra/stack/kafka-ui-ctl.sh \
            "${RUSER}@${RHOST}:~/hh-process/stack/"
          ssh -p "$RPORT" -i ~/.ssh/id_key "${RUSER}@${RHOST}" \
            'chmod +x "$HOME/hh-process/stack/install-kafka-kraft.sh" "$HOME/hh-process/stack/kafka-ctl.sh" "$HOME/hh-process/stack/kafka-ui-ctl.sh"'
          echo "Running install-kafka-kraft.sh on stack host..."
          ssh -p "$RPORT" -i ~/.ssh/id_key "${RUSER}@${RHOST}" \
            "export KAFKA_ADVERTISED_HOST=${STACK_HOST} && \"\$HOME/hh-process/stack/install-kafka-kraft.sh\""
          echo "Starting broker (kafka-ctl.sh start)..."
          ssh -p "$RPORT" -i ~/.ssh/id_key "${RUSER}@${RHOST}" \
            '$HOME/hh-process/stack/kafka-ctl.sh start'
          echo "Healthcheck: broker TCP 127.0.0.1:9092 (max ~80s)..."
          ok=0
          for i in $(seq 1 40); do
            if ssh -p "$RPORT" -i ~/.ssh/id_key -o ConnectTimeout=5 "${RUSER}@${RHOST}" \
              'nc -z 127.0.0.1 9092' 2>/dev/null; then
              echo "Broker OK: port 9092 open (${i}/40)."
              ok=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              echo "  ... waiting (${i}/40, ~$((i * 2))s)"
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Kafka: port 9092 did not open — check ~/hh-process/kafka.log on the host"
            exit 1
          fi
          echo "Healthcheck: kafka-broker-api-versions (Apache tarball uses .sh)..."
          if ! ssh -p "$RPORT" -i ~/.ssh/id_key -o ConnectTimeout=10 "${RUSER}@${RHOST}" \
            'bash "$HOME/hh-process/kafka/bin/kafka-broker-api-versions.sh" --bootstrap-server 127.0.0.1:9092 >/dev/null'; then
            echo "::error::Kafka broker API check failed"
            exit 1
          fi
          echo "Broker API OK."

      - name: Kafka UI on stack host
        if: ${{ vars.SKIP_NATIVE_STACK != 'true' && vars.SKIP_KAFKA_UI != 'true' }}
        env:
          KAFKA_UI_PORT: ${{ vars.KAFKA_UI_PORT || '8081' }}
          KAFKA_UI_VERSION: ${{ vars.KAFKA_UI_VERSION || '1.4.2' }}
        run: |
          set -eu
          echo "## Kafka UI — JAR (kafbat, no Docker). Variables: KAFKA_UI_PORT, KAFKA_UI_VERSION; skip: SKIP_KAFKA_UI"
          RUSER="${{ env.SSH_USER }}"
          RHOST="${{ env.SSH_HOST }}"
          RPORT="${{ env.SSH_PORT }}"
          ssh -p "$RPORT" -i ~/.ssh/id_key "${RUSER}@${RHOST}" \
            "export KAFKA_UI_PORT=${KAFKA_UI_PORT} KAFKA_UI_VERSION=${KAFKA_UI_VERSION} && \"\$HOME/hh-process/stack/kafka-ui-ctl.sh\" start"
          echo "Healthcheck: UI TCP 127.0.0.1:${KAFKA_UI_PORT} (max ~45s, first run downloads ~130MB JAR)..."
          ok=0
          for i in $(seq 1 22); do
            if ssh -p "$RPORT" -i ~/.ssh/id_key -o ConnectTimeout=5 "${RUSER}@${RHOST}" \
              "nc -z 127.0.0.1 ${KAFKA_UI_PORT}" 2>/dev/null; then
              echo "Kafka UI OK (${i}/22)."
              ok=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              echo "  ... waiting (${i}/22)"
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::warning::Kafka UI: port ${KAFKA_UI_PORT} not open — see ~/hh-process/kafka-ui.log on the host"
          fi

      - name: Create app.env from secrets/vars
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          echo "## Generate app.env (secrets + vars, excluding SSH/tunnel keys)"
          python << 'PYTHON'
          import json
          import os

          secrets = json.loads(os.environ.get('ALL_SECRETS', '{}'))
          vars = json.loads(os.environ.get('ALL_VARS', '{}'))

          with open('app.env', 'w') as f:
              for key, value in {**secrets, **vars}.items():
                  if key not in [
                      'SSH_KEY', 'SSH_HOST', 'SSH_PORT', 'SSH_USER',
                      'VPS_SSH_KEY', 'VPS_SSH_HOST', 'VPS_SSH_PORT', 'VPS_SSH_USER',
                      'HELIOS_TUNNEL_PRIVATE_KEY', 'DB_TUNNEL_REMOTE_HOST', 'DB_TUNNEL_REMOTE_PORT',
                      'github_token'
                  ]:
                      if value is not None:
                          value = str(value).strip()
                      f.write(f'{key}={value}\n')
          PYTHON

          echo "app.env: $(wc -l < app.env | tr -d ' ') variables"

      - name: Pin Kafka bootstrap for API (native broker on stack host)
        if: ${{ vars.SKIP_NATIVE_STACK != 'true' }}
        run: |
          set -eu
          echo "## Set KAFKA_BOOTSTRAP_SERVERS to stack broker"
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "${STACK_HOST}" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          grep -v '^KAFKA_BOOTSTRAP_SERVERS=' app.env > app.env.tmp || cp app.env app.env.tmp
          mv app.env.tmp app.env
          echo "KAFKA_BOOTSTRAP_SERVERS=${STACK_HOST}:9092" >> app.env
          echo "KAFKA_BOOTSTRAP_SERVERS=${STACK_HOST}:9092"

      - name: Prepare VPS SSH for DB tunnel
        if: ${{ vars.POSTGRES_HOST == '127.0.0.1' || vars.POSTGRES_HOST == 'localhost' }}
        run: |
          set -eu
          echo "## VPS SSH client (reverse DB tunnel — needs VPS_* and HELIOS_TUNNEL_PRIVATE_KEY secrets)"
          if [ -z "${{ secrets.VPS_SSH_HOST }}" ] || [ -z "${{ secrets.VPS_SSH_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.HELIOS_TUNNEL_PRIVATE_KEY }}" ]; then
            echo "VPS secrets incomplete — skipping key setup (tunnel only works if already up on helios)."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps
          VPS_PORT="${{ secrets.VPS_SSH_PORT }}"
          [ -z "$VPS_PORT" ] && VPS_PORT=22
          ssh-keyscan -p "$VPS_PORT" -H "${{ secrets.VPS_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' "${{ secrets.HELIOS_TUNNEL_PRIVATE_KEY }}" > helios_tunnel_key
          chmod 600 helios_tunnel_key
          echo "VPS SSH key ready for ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}"

      - name: Upload bundle to server
        run: |
          set -eu
          echo "## Upload JAR, app.env, appctl.sh → ~/apps/blps"
          APP_DIR="~/apps/blps"
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/app.jar"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            app.env \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/app.env"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            infra/appctl.sh \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/appctl.sh"

          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"
          echo "Upload done."

      - name: Ensure DB reverse tunnel on helios
        if: ${{ vars.POSTGRES_HOST == '127.0.0.1' || vars.POSTGRES_HOST == 'localhost' }}
        run: |
          set -eu
          echo "## DB reverse tunnel — helios 127.0.0.1:POSTGRES_PORT → VPS REMOTE_DB (needs VPS_* + HELIOS_TUNNEL_PRIVATE_KEY)"
          DB_PORT="${{ vars.POSTGRES_PORT }}"
          [ -z "$DB_PORT" ] && DB_PORT=15432
          REMOTE_DB_HOST="${{ vars.DB_TUNNEL_REMOTE_HOST }}"
          [ -z "$REMOTE_DB_HOST" ] && REMOTE_DB_HOST=127.0.0.1
          REMOTE_DB_PORT="${{ vars.DB_TUNNEL_REMOTE_PORT }}"
          [ -z "$REMOTE_DB_PORT" ] && REMOTE_DB_PORT=5432
          HELIOS_HOST="${{ env.SSH_HOST }}"
          HELIOS_PORT="${{ env.SSH_PORT }}"
          HELIOS_USER="${{ env.SSH_USER }}"
          echo "Map: helios:127.0.0.1:${DB_PORT} ← reverse SSH ← ${REMOTE_DB_HOST}:${REMOTE_DB_PORT} (on VPS)"

          if ssh -p "$HELIOS_PORT" -i ~/.ssh/id_key -o ConnectTimeout=5 "$HELIOS_USER@$HELIOS_HOST" "nc -z 127.0.0.1 $DB_PORT"; then
            echo "Tunnel already up on helios:127.0.0.1:${DB_PORT}"
            exit 0
          fi
          echo "No listener on helios:${DB_PORT} — trying to open tunnel from VPS..."

          if [ -z "${{ secrets.VPS_SSH_HOST }}" ] || [ -z "${{ secrets.VPS_SSH_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.HELIOS_TUNNEL_PRIVATE_KEY }}" ]; then
            echo "::error::Tunnel down and secrets missing: set VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_KEY, HELIOS_TUNNEL_PRIVATE_KEY (or start tunnel manually on helios)."
            exit 1
          fi

          VPS_PORT="${{ secrets.VPS_SSH_PORT }}"
          [ -z "$VPS_PORT" ] && VPS_PORT=22

          scp -P "$VPS_PORT" -i ~/.ssh/id_vps helios_tunnel_key "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:~/.ssh/helios_tunnel_key"

          echo "Starting reverse SSH from VPS to helios..."
          ssh -p "$VPS_PORT" -i ~/.ssh/id_vps "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}" \
            "set -eu; \
            mkdir -p ~/.ssh; chmod 700 ~/.ssh; chmod 600 ~/.ssh/helios_tunnel_key; \
            ssh-keyscan -p ${HELIOS_PORT} -H ${HELIOS_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true; \
            pkill -f \"R ${DB_PORT}:${REMOTE_DB_HOST}:${REMOTE_DB_PORT}\" 2>/dev/null || true; \
            ssh -f -N -i ~/.ssh/helios_tunnel_key -p ${HELIOS_PORT} \
              -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
              -R ${DB_PORT}:${REMOTE_DB_HOST}:${REMOTE_DB_PORT} \
              ${HELIOS_USER}@${HELIOS_HOST}"

          echo "Waiting for helios:127.0.0.1:${DB_PORT} (max ~40s)..."
          ok=0
          for i in $(seq 1 20); do
            if ssh -p "$HELIOS_PORT" -i ~/.ssh/id_key -o ConnectTimeout=5 "$HELIOS_USER@$HELIOS_HOST" "nc -z 127.0.0.1 $DB_PORT"; then
              echo "Tunnel OK (${i}/20)."
              ok=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              echo "  ... waiting (${i}/20)"
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Tunnel did not open helios:127.0.0.1:${DB_PORT} — check VPS→helios SSH and Postgres on ${REMOTE_DB_HOST}:${REMOTE_DB_PORT}"
            exit 1
          fi

      - name: Restart service on server
        run: |
          set -eu
          echo "## Restart Spring Boot (appctl.sh restart)"
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"

      - name: Healthcheck
        run: |
          set -eu
          echo "## API TCP on stack (localhost, SERVER_PORT)"
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          echo "Waiting for 127.0.0.1:${PORT} (max ~60s)..."
          if ! ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=5 \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "i=0; while [ \$i -lt 60 ]; do nc -z 127.0.0.1 ${PORT} && exit 0; sleep 1; i=\$((i+1)); done; exit 1"; then
            echo "::error::Nothing listening on stack host 127.0.0.1:${PORT} — check app.log on server"
            exit 1
          fi
          echo "TCP OK on port ${PORT}"

      - name: Run deployed API tests via SSH tunnel
        run: |
          set -eu
          echo "## Deployed API tests (SSH -L to actuator, then test/test.py)"
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          LOCAL_PORT=18080

          ssh -N \
            -L ${LOCAL_PORT}:127.0.0.1:${PORT} \
            -p "${{ env.SSH_PORT }}" \
            -i ~/.ssh/id_key \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" &
          TUNNEL_PID=$!
          trap 'kill ${TUNNEL_PID} 2>/dev/null || true' EXIT

          READY=0
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null "http://127.0.0.1:${LOCAL_PORT}/actuator/health"; then
              echo "Forwarded /actuator/health OK (${i}/20)."
              READY=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              echo "  ... waiting tunnel+app (${i}/20)"
            fi
            sleep 1
          done
          [ "$READY" = "1" ] || { echo "::error::Health via SSH forward failed — tunnel or app down"; exit 1; }

          export BASE_URL="http://127.0.0.1:${LOCAL_PORT}"
          export REQUEST_TIMEOUT=60

          ADMIN_EMAIL_VALUE="${{ vars.ADMIN_EMAIL }}"
          [ -n "$ADMIN_EMAIL_VALUE" ] && export ADMIN_EMAIL="$ADMIN_EMAIL_VALUE"

          ADMIN_PASSWORD_VALUE="${{ secrets.ADMIN_PASSWORD }}"
          [ -z "$ADMIN_PASSWORD_VALUE" ] && ADMIN_PASSWORD_VALUE="${{ vars.ADMIN_PASSWORD }}"
          [ -n "$ADMIN_PASSWORD_VALUE" ] && export ADMIN_PASSWORD="$ADMIN_PASSWORD_VALUE"

          RECRUITER_EMAIL_VALUE="${{ vars.RECRUITER_EMAIL }}"
          [ -n "$RECRUITER_EMAIL_VALUE" ] && export RECRUITER_EMAIL="$RECRUITER_EMAIL_VALUE"

          RECRUITER_PASSWORD_VALUE="${{ secrets.RECRUITER_PASSWORD }}"
          [ -z "$RECRUITER_PASSWORD_VALUE" ] && RECRUITER_PASSWORD_VALUE="${{ vars.RECRUITER_PASSWORD }}"
          [ -n "$RECRUITER_PASSWORD_VALUE" ] && export RECRUITER_PASSWORD="$RECRUITER_PASSWORD_VALUE"

          CANDIDATE_PASSWORD_VALUE="${{ secrets.CANDIDATE_PASSWORD }}"
          [ -z "$CANDIDATE_PASSWORD_VALUE" ] && CANDIDATE_PASSWORD_VALUE="${{ vars.CANDIDATE_PASSWORD }}"
          [ -n "$CANDIDATE_PASSWORD_VALUE" ] && export CANDIDATE_PASSWORD="$CANDIDATE_PASSWORD_VALUE"

          APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE="${{ vars.APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS }}"
          [ -n "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" ] && export APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS="$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE"
          if [ -n "${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-}" ]; then
            export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS
          elif [ -n "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" ]; then
            case "$(echo "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on) export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=1 ;;&
              *) export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=0 ;;&
            esac
          fi

          echo "Timeout debug flags: APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-} TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-}"
          python test/test.py
          echo "API tests finished."


      - name: Fetch app.log from server
        if: always()
        run: |
          echo "## Fetch ~/apps/blps/app.log (for artifact)"
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=10 \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cat ~/apps/blps/app.log 2>/dev/null || echo '(app.log not found or empty)'" > app.log 2>/dev/null || true
          test -f app.log || echo "app.log not available" > app.log

      - name: Upload app.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-${{ github.run_id }}
          path: app.log

  # Screening workers: one JAR per host, separate from API/Kafka (see vars WORKER*_SSH_* and STACK_HOST).
  deploy-worker-1:
    needs: [build, deploy]
    if: ${{ always() && !cancelled() && vars.WORKER1_SSH_HOST != '' && needs.build.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      SSH_KEY: ${{ secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      WORKER1_SSH_KEY: ${{ secrets.WORKER1_SSH_KEY || vars.WORKER1_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/appctl.sh
            infra/ci/render_worker_env.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifact

      - name: Render worker1.env
        env:
          WORKER_NUM: "1"
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "${STACK_HOST}" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          export STACK_HOST
          export STACK_KAFKA_PORT="${{ vars.STACK_KAFKA_PORT }}"
          export STACK_POSTGRES_PORT="${{ vars.STACK_POSTGRES_PORT }}"
          python infra/ci/render_worker_env.py

      - name: Prepare SSH
        run: |
          set -eu
          echo "## Worker 1 — SSH"
          mkdir -p ~/.ssh
          if [ -n "${{ env.WORKER1_SSH_KEY }}" ]; then
            echo "${{ env.WORKER1_SSH_KEY }}" > ~/.ssh/id_worker
          else
            echo "${{ env.SSH_KEY }}" > ~/.ssh/id_worker
          fi
          chmod 600 ~/.ssh/id_worker
          WPORT="${{ vars.WORKER1_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh-keyscan -p "$WPORT" -H "${{ vars.WORKER1_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload bundle to worker 1
        run: |
          set -eu
          echo "## Worker 1 — upload JAR + env + appctl"
          APP_DIR="~/apps/blps"
          WPORT="${{ vars.WORKER1_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}:${APP_DIR}/app.jar"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            worker1.env \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}:${APP_DIR}/app.env"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            infra/appctl.sh \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}:${APP_DIR}/appctl.sh"
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"

      - name: Restart worker 1
        run: |
          WPORT="${{ vars.WORKER1_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER1_SSH_USER }}@${{ vars.WORKER1_SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"

  deploy-worker-2:
    needs: [build, deploy]
    if: ${{ always() && !cancelled() && vars.WORKER2_SSH_HOST != '' && needs.build.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      SSH_KEY: ${{ secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      WORKER2_SSH_KEY: ${{ secrets.WORKER2_SSH_KEY || vars.WORKER2_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/appctl.sh
            infra/ci/render_worker_env.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: artifact

      - name: Render worker2.env
        env:
          WORKER_NUM: "2"
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "${STACK_HOST}" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          export STACK_HOST
          export STACK_KAFKA_PORT="${{ vars.STACK_KAFKA_PORT }}"
          export STACK_POSTGRES_PORT="${{ vars.STACK_POSTGRES_PORT }}"
          python infra/ci/render_worker_env.py

      - name: Prepare SSH
        run: |
          set -eu
          echo "## Worker 2 — SSH"
          mkdir -p ~/.ssh
          if [ -n "${{ env.WORKER2_SSH_KEY }}" ]; then
            echo "${{ env.WORKER2_SSH_KEY }}" > ~/.ssh/id_worker
          else
            echo "${{ env.SSH_KEY }}" > ~/.ssh/id_worker
          fi
          chmod 600 ~/.ssh/id_worker
          WPORT="${{ vars.WORKER2_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh-keyscan -p "$WPORT" -H "${{ vars.WORKER2_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload bundle to worker 2
        run: |
          set -eu
          echo "## Worker 2 — upload JAR + env + appctl"
          APP_DIR="~/apps/blps"
          WPORT="${{ vars.WORKER2_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}:${APP_DIR}/app.jar"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            worker2.env \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}:${APP_DIR}/app.env"
          scp -P "$WPORT" -i ~/.ssh/id_worker \
            infra/appctl.sh \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}:${APP_DIR}/appctl.sh"
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"

      - name: Restart worker 2
        run: |
          WPORT="${{ vars.WORKER2_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          ssh -p "$WPORT" -i ~/.ssh/id_worker \
            "${{ vars.WORKER2_SSH_USER }}@${{ vars.WORKER2_SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"
