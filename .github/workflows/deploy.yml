name: Build, Test & Deploy blps

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Explicit permissions: artifact download in deploy needs actions: read (some orgs default to restricted).
permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_SCHEMA: public
  SERVER_PORT: 8080
  NARAYANA_LOG_DIR: ./transaction-logs
  NARAYANA_NODE_IDENTIFIER: hh-process-ci
  APP_SECURITY_USERS_XML: ./data/users.xml
  APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS: true
  TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS: 1

# Repository variable CI_SKIP_TESTS: set to "true" or "1" to skip the test job and deployed API tests in deploy (build and later jobs still run).
# Zookeeper + Kafka: на **VPS** (не helios). На helios API: `KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:<HELIOS_KAFKA_TUNNEL_PORT>` (по умолчанию 9092) через reverse SSH. `SKIP_NATIVE_STACK=true` — не ставить ZK+Kafka на VPS.
# Reverse SSH с VPS → helios: `HELIOS_TUNNEL_PRIVATE_KEY`, `VPS_SSH_*`; на helios подключение: `HELIOS_TUNNEL_SSH_HOST/PORT/USER` (по умолчанию = SSH_*) + все `-R` в одной сессии: БД (если POSTGRES с туннелем), Kafka, и `VPS_HELIOS_TUNNEL_EXTRA_R` (например `8090:127.0.0.1:8090;…`).
# EIS (Odoo) на VPS: `deploy-odoo-vps.sh` … `SKIP_ODOO_VPS=true` отключает.
jobs:
  test:
    if: ${{ vars.CI_SKIP_TESTS != 'true' && vars.CI_SKIP_TESTS != '1' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies for API tests
        run: python -m pip install --upgrade pip requests "psycopg[binary]"

      - name: Start PostgreSQL with prepared transactions enabled
        run: |
          docker run -d \
            --name hh-process-ci-postgres \
            -e POSTGRES_DB=${POSTGRES_DB} \
            -e POSTGRES_USER=${POSTGRES_USER} \
            -e POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
            -p ${POSTGRES_PORT}:5432 \
            --health-cmd="pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=20 \
            postgres:16-alpine \
            postgres -c max_prepared_transactions=100

      - name: Wait for PostgreSQL healthcheck
        run: |
          set -eu
          echo "## PostgreSQL — waiting for healthy (max ~120s)"
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' hh-process-ci-postgres 2>/dev/null || echo '"starting"')
            if [ "$STATUS" = '"healthy"' ]; then
              echo "PostgreSQL OK (attempt ${i}/60)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 15)) -eq 0 ]; then
              echo "  ... status ${STATUS} (${i}/60)"
            fi
            sleep 2
          done
          echo "::error::PostgreSQL did not become healthy in time"
          docker logs hh-process-ci-postgres 2>&1 | tail -n 80 || true
          exit 1

      # App expects Kafka (listeners + producer); default bootstrap is kafka:9092 — not resolvable on the runner.
      - name: Start Zookeeper and Kafka (CI)
        run: |
          set -eu
          echo "## CI: Zookeeper + Kafka (Docker) for integration tests"
          docker network create hh-process-ci-net 2>/dev/null || true
          docker run -d \
            --name hh-process-ci-zookeeper \
            --network hh-process-ci-net \
            -e ZOOKEEPER_CLIENT_PORT=2181 \
            -e ZOOKEEPER_TICK_TIME=2000 \
            confluentinc/cp-zookeeper:7.6.1
          echo "Healthcheck: waiting for Zookeeper (2181, up to ~80s)..."
          zk_ok=0
          for i in $(seq 1 40); do
            if docker exec hh-process-ci-zookeeper bash -c "echo srvr | nc -w 2 localhost 2181 | grep -q Mode" 2>/dev/null; then
              echo "Zookeeper OK (${i}/40, ~$((i * 2))s)."
              zk_ok=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 10)) -eq 0 ]; then
              echo "  ... Zookeeper still starting (${i}/40)"
            fi
            sleep 2
          done
          if [ "$zk_ok" -ne 1 ]; then
            echo "Zookeeper healthcheck failed." >&2
            docker logs hh-process-ci-zookeeper || true
            exit 1
          fi
          docker run -d \
            --name hh-process-ci-kafka \
            --network hh-process-ci-net \
            -p 29092:29092 \
            -e KAFKA_BROKER_ID=1 \
            -e KAFKA_ZOOKEEPER_CONNECT=hh-process-ci-zookeeper:2181 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://hh-process-ci-kafka:9092,PLAINTEXT_HOST://localhost:29092 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092 \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_AUTO_CREATE_TOPICS_ENABLE=true \
            confluentinc/cp-kafka:7.6.1
          echo "Healthcheck: waiting for Kafka broker API (localhost:9092 in container, up to ~120s)..."
          for i in $(seq 1 60); do
            if docker exec hh-process-ci-kafka kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1; then
              echo "Kafka OK: broker API ready (${i}/60, ~$((i * 2))s)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 10)) -eq 0 ]; then
              echo "  ... Kafka still starting (${i}/60)"
            fi
            sleep 2
          done
          echo "Kafka healthcheck failed: broker did not respond in time." >&2
          docker logs hh-process-ci-kafka || true
          exit 1

      - name: Build application
        run: mvn -B clean package -DskipTests

      - name: Start application
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:29092
          APP_EIS_REMOTE_BASE_URL: http://127.0.0.1:65530
        run: |
          mkdir -p "$NARAYANA_LOG_DIR" "$(dirname "$APP_SECURITY_USERS_XML")"
          nohup java -Dnarayana.log-dir="$NARAYANA_LOG_DIR" -Dapp.security.users-xml-path="$APP_SECURITY_USERS_XML" -jar target/*.jar > app-ci.log 2>&1 &
          echo $! > app.pid

      - name: Wait for healthcheck
        run: |
          set -eu
          echo "## Application — /actuator/health (max ~120s)"
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:8080/actuator/health; then
              echo "Application OK (attempt ${i}/60)."
              exit 0
            fi
            if [ "$i" -eq 1 ] || [ $((i % 15)) -eq 0 ]; then
              echo "  ... still starting (${i}/60)"
            fi
            sleep 2
          done
          echo "::error::Application did not become healthy — see app-ci.log artifact"
          tail -n 50 app-ci.log 2>/dev/null || true
          exit 1

      - name: Run API tests from test/
        run: |
          echo "APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS}"
          echo "TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS}"
          python test/test.py
          python test/test_composite_transactions.py
          python test/test_security_validation.py
          python test/test_access_matrix.py
          python test/test_transaction_atomicity.py
          python test/test_business_rules.py
          python test/test_timeout_job_db_fixture.py


      - name: Upload PostgreSQL CI log
        if: always()
        run: docker logs hh-process-ci-postgres > postgres-ci.log 2>&1 || true

      - name: Upload CI app log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-app-log-${{ github.run_id }}
          path: app-ci.log

      - name: Upload PostgreSQL CI log artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-postgres-log-${{ github.run_id }}
          path: postgres-ci.log

  build:
    needs: test
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.vars.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: |
          echo "## Maven package (skip unit tests)"
          mvn -B clean package -DskipTests

      - name: Detect JAR name
        id: vars
        run: |
          JAR=$(ls -1 target/*-SNAPSHOT.jar target/*.jar 2>/dev/null | head -n1)
          test -n "$JAR"
          echo "jar_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jar
          path: target/${{ steps.vars.outputs.jar_name }}

  deploy:
    needs: build
    # always() is required: implicit success() is false if *any* job was skipped (e.g. test when CI_SKIP_TESTS),
    # even when build succeeded — without always(), deploy never starts.
    if: ${{ always() && !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      # Prefer repository secrets; fall back to Actions variables (same names: SSH_KEY, SSH_HOST, …).
      SSH_KEY: ${{ secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      # VPS (туннель БД): как SSH — сначала secrets, иначе vars.
      VPS_DEPLOY_HOST: ${{ secrets.VPS_SSH_HOST || vars.VPS_SSH_HOST }}
      VPS_DEPLOY_USER: ${{ secrets.VPS_SSH_USER || vars.VPS_SSH_USER }}
      VPS_DEPLOY_PORT: ${{ secrets.VPS_SSH_PORT || vars.VPS_SSH_PORT || '22' }}
      # Seconds: TCP wait on stack + actuator poll via SSH tunnel (vars.API_HEALTHCHECK_TIMEOUT_SEC, default 60).
      API_HEALTHCHECK_TIMEOUT_SEC: ${{ vars.API_HEALTHCHECK_TIMEOUT_SEC || '60' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            infra/appctl.sh
            infra/ci/render_worker_env.py
            infra/odoo-vps/deploy-odoo-vps.sh
            infra/odoo-vps/ensure-postgres-for-odoo.sh
            infra/odoo-vps/install-odoo-ubuntu.sh
            infra/stack/install-zookeeper.sh
            infra/stack/zookeeper-ctl.sh
            infra/stack/install-kafka-broker-zookeeper.sh
            infra/stack/kafka-ctl.sh
            odoo-addons
            test
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies for deployed API tests
        if: ${{ vars.CI_SKIP_TESTS != 'true' && vars.CI_SKIP_TESTS != '1' }}
        run: python -m pip install --upgrade pip requests

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: jar
          path: artifact

      - name: Prepare SSH
        run: |
          set -eu
          echo "## SSH — stack host ${{ env.SSH_USER }}@${{ env.SSH_HOST }} (port ${{ env.SSH_PORT }})"
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH ready."

      - name: "Prepare VPS SSH (same as VPS_SSH_HOST / USER / KEY)"
        if: ${{ env.VPS_DEPLOY_HOST }}
        run: |
          set -eu
          echo "## VPS — ~/.ssh/id_vps for ${{ env.VPS_DEPLOY_USER }}@${{ env.VPS_DEPLOY_HOST }} (VPS_SSH_*)"
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::warning::VPS_SSH_KEY пуст: rsync Odoo и reverse SSH с VPS к helios невозможны без ключа. Задайте secret (или org secret) VPS_SSH_KEY."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps
          VPS_PORT="${{ env.VPS_DEPLOY_PORT }}"
          ssh-keyscan -p "$VPS_PORT" -H "${{ env.VPS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "VPS id_vps готов (тот же key для туннеля БД и для rsync модуля Odoo)."

      - name: Write helios tunnel private key to workspace
        if: ${{ env.VPS_DEPLOY_HOST }}
        run: |
          set -eu
          if [ -n "${{ secrets.HELIOS_TUNNEL_PRIVATE_KEY }}" ]; then
            printf '%s\n' "${{ secrets.HELIOS_TUNNEL_PRIVATE_KEY }}" > helios_tunnel_key
            chmod 600 helios_tunnel_key
            echo "helios_tunnel_key в workspace (VPS → helios reverse SSH)"
          else
            echo "HELIOS_TUNNEL_PRIVATE_KEY not set (tunnel step will skip or fail if needed)"
          fi

      - name: Stop stack on helios and Kafka on VPS before deploy
        run: |
          set -eu
          RUSER="${{ env.SSH_USER }}"
          RHOST="${{ env.SSH_HOST }}"
          RPORT="${{ env.SSH_PORT }}"
          echo "## Pre-deploy: helios — только API (Kafka на VPS, не трогаем старые kafka-ctl на helios)"
          ssh -p "$RPORT" -i ~/.ssh/id_key -o BatchMode=yes "${RUSER}@${RHOST}" \
            "env bash -c 'set +e; \
            if [ -f \"\$HOME/apps/blps/appctl.sh\" ]; then echo \"Stopping API on helios...\"; bash \"\$HOME/apps/blps/appctl.sh\" stop; else echo \"No appctl — skip API\"; fi; \
            echo \"helios pre-stop done.\"'"
          if [ -f ~/.ssh/id_vps ] && [ -n "${{ env.VPS_DEPLOY_HOST }}" ]; then
            VUSER="${{ env.VPS_DEPLOY_USER }}"
            VHOST="${{ env.VPS_DEPLOY_HOST }}"
            VPOR="${{ env.VPS_DEPLOY_PORT }}"
            echo "## Pre-deploy: VPS — ZK+Kafka (если скрипты есть)"
            ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "${VUSER}@${VHOST}" \
              "env bash -c 'set +e; \
              if [ -f \"\$HOME/hh-process/stack/kafka-ctl.sh\" ]; then echo \"Stopping Kafka on VPS...\"; bash \"\$HOME/hh-process/stack/kafka-ctl.sh\" stop; fi; \
              if [ -f \"\$HOME/hh-process/stack/zookeeper-ctl.sh\" ]; then echo \"Stopping Zookeeper on VPS...\"; bash \"\$HOME/hh-process/stack/zookeeper-ctl.sh\" stop; fi; \
              echo \"VPS pre-stop done.\"'" || true
          fi
          sleep 2

      # ZK+Kafka в ~/hh-process **на VPS**; advertised 127.0.0.1 (metadata для клиента на helios через -R). SKIP_NATIVE_STACK — не ставить.
      - name: Install and start Zookeeper and Kafka on VPS
        if: ${{ vars.SKIP_NATIVE_STACK != 'true' && vars.SKIP_NATIVE_STACK != '1' }}
        run: |
          set -eu
          if [ ! -f ~/.ssh/id_vps ]; then
            echo "::error::VPS_SSH_KEY / id_vps required to install Kafka on VPS"
            exit 1
          fi
          echo "## Zookeeper + Kafka on **VPS** (не helios); туннель на helios: HELIOS_KAFKA_TUNNEL_PORT → 127.0.0.1:9092"
          VUSER="${{ env.VPS_DEPLOY_USER }}"
          VHOST="${{ env.VPS_DEPLOY_HOST }}"
          VPOR="${{ env.VPS_DEPLOY_PORT }}"
          VREM="${VUSER}@${VHOST}"
          ADV="${{ vars.VPS_KAFKA_ADVERTISED_HOST }}"
          if [ -z "$ADV" ]; then ADV=127.0.0.1; fi
          echo "KAFKA_ADVERTISED_HOST=$ADV (для брокера; клиент helios смотрит 127.0.0.1:<туннель-порт>)"
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes -o ConnectTimeout=30 "$VREM" "mkdir -p \"\$HOME/hh-process/stack\""
          scp -P "$VPOR" -i ~/.ssh/id_vps \
            infra/stack/install-zookeeper.sh \
            infra/stack/zookeeper-ctl.sh \
            infra/stack/install-kafka-broker-zookeeper.sh \
            infra/stack/kafka-ctl.sh \
            "${VREM}:~/hh-process/stack/"
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "$VREM" \
            "env bash -c 'chmod +x \
              \"\$HOME/hh-process/stack/install-zookeeper.sh\" \
              \"\$HOME/hh-process/stack/zookeeper-ctl.sh\" \
              \"\$HOME/hh-process/stack/install-kafka-broker-zookeeper.sh\" \
              \"\$HOME/hh-process/stack/kafka-ctl.sh\"'"
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "$VREM" "env bash -c '\$HOME/hh-process/stack/install-zookeeper.sh'"
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "$VREM" \
            "env bash -c 'export KAFKA_ADVERTISED_HOST=\"${ADV}\" && \"\$HOME/hh-process/stack/install-kafka-broker-zookeeper.sh\"'"
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "$VREM" \
            "env bash -c '\$HOME/hh-process/stack/zookeeper-ctl.sh start || \$HOME/hh-process/stack/zookeeper-ctl.sh restart'"
          if ! ssh -p "$VPOR" -i ~/.ssh/id_vps -o ConnectTimeout=5 -o BatchMode=yes "$VREM" \
            "env bash -c 'i=0; while [ \$i -lt 20 ]; do nc -z 127.0.0.1 2181 && exit 0; sleep 2; i=\$((i+1)); done; exit 1'"; then
            echo "::error::VPS ZK 2181 — см. ~/hh-process/zookeeper.log"
            exit 1
          fi
          ssh -p "$VPOR" -i ~/.ssh/id_vps -o BatchMode=yes "$VREM" "env bash -c '\$HOME/hh-process/stack/kafka-ctl.sh restart'"
          if ! ssh -p "$VPOR" -i ~/.ssh/id_vps -o ConnectTimeout=5 -o BatchMode=yes "$VREM" \
            "env bash -c 'i=0; while [ \$i -lt 40 ]; do nc -z 127.0.0.1 9092 && exit 0; sleep 2; i=\$((i+1)); done; exit 1'"; then
            echo "::error::VPS Kafka 9092 — ~/hh-process/kafka.log"
            exit 1
          fi
          if ! ssh -p "$VPOR" -i ~/.ssh/id_vps -o ConnectTimeout=10 -o BatchMode=yes "$VREM" \
            "env bash -c 'bash \"\$HOME/hh-process/kafka/bin/kafka-broker-api-versions.sh\" --bootstrap-server 127.0.0.1:9092 >/dev/null'"; then
            echo "::error::Kafka API check on VPS"
            exit 1
          fi
          echo "Broker OK on VPS (forward to helios в шаге туннеля)"

      - name: Create app.env from secrets/vars
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        run: |
          echo "## Generate app.env (secrets + vars, excluding SSH/tunnel keys)"
          python << 'PYTHON'
          import json
          import os

          secrets = json.loads(os.environ.get('ALL_SECRETS', '{}'))
          vars = json.loads(os.environ.get('ALL_VARS', '{}'))

          with open('app.env', 'w') as f:
              for key, value in {**secrets, **vars}.items():
                  if key not in [
                      'SSH_KEY', 'SSH_HOST', 'SSH_PORT', 'SSH_USER',
                      'VPS_SSH_KEY', 'VPS_SSH_HOST', 'VPS_SSH_PORT', 'VPS_SSH_USER',
                      'WORKER_SSH_KEY', 'WORKER_SSH_HOST', 'WORKER_SSH_PORT', 'WORKER_SSH_USER',
                      'HELIOS_TUNNEL_PRIVATE_KEY', 'DB_TUNNEL_REMOTE_HOST', 'DB_TUNNEL_REMOTE_PORT',
                      'github_token'
                  ]:
                      if value is not None:
                          value = str(value).strip()
                      f.write(f'{key}={value}\n')
          PYTHON

          echo "app.env: $(wc -l < app.env | tr -d ' ') variables"

      - name: Pin Kafka bootstrap for API (туннель helios → брокер на VPS)
        if: ${{ vars.SKIP_NATIVE_STACK != 'true' && vars.SKIP_NATIVE_STACK != '1' }}
        run: |
          set -eu
          echo "## KAFKA_BOOTSTRAP_SERVERS: localhost на helios, порт = HELIOS_KAFKA_TUNNEL_PORT (→ VPS:9092)"
          KTP="${{ vars.HELIOS_KAFKA_TUNNEL_PORT }}"
          if [ -z "$KTP" ]; then KTP=9092; fi
          grep -v '^KAFKA_BOOTSTRAP_SERVERS=' app.env > app.env.tmp || cp app.env app.env.tmp
          mv app.env.tmp app.env
          echo "KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:${KTP}" >> app.env
          echo "KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:${KTP}"

      - name: Pin EIS URL for API
        run: |
          set -eu
          grep -v '^APP_EIS_REMOTE_BASE_URL=' app.env > app.env.tmp || cp app.env app.env.tmp
          mv app.env.tmp app.env
          VPSH="${VPS_DEPLOY_HOST:-}"
          # 1) ODOO_VPS_PUBLIC_BASE_URL  2) APP_EIS_REMOTE_BASE_URL  3) same VPS: http://<VPS_SSH_HOST>:8069
          if [ -n "${{ vars.ODOO_VPS_PUBLIC_BASE_URL }}" ]; then
            FALLBACK_URL="${{ vars.ODOO_VPS_PUBLIC_BASE_URL }}"
            echo "EIS: ODOO_VPS_PUBLIC_BASE_URL"
          elif [ -n "${{ vars.APP_EIS_REMOTE_BASE_URL }}" ]; then
            FALLBACK_URL="${{ vars.APP_EIS_REMOTE_BASE_URL }}"
            echo "EIS: APP_EIS_REMOTE_BASE_URL"
          elif [ -n "$VPSH" ]; then
            FALLBACK_URL="http://${VPSH}:8069"
            echo "EIS: default to same VPS (VPS_SSH_HOST) — $FALLBACK_URL"
          else
            echo "::error::Задайте APP_EIS_REMOTE_BASE_URL, ODOO_VPS_PUBLIC_BASE_URL или VPS_SSH_HOST (будет http://host:8069)."
            exit 1
          fi
          echo "APP_EIS_REMOTE_BASE_URL=$FALLBACK_URL" >> app.env
          echo "APP_EIS_REMOTE_BASE_URL=$FALLBACK_URL"

      - name: Deploy Odoo on VPS
        if: ${{ env.VPS_DEPLOY_HOST && vars.SKIP_ODOO_VPS != 'true' && vars.SKIP_ODOO_VPS != '1' }}
        env:
          EIS_KEY_FOR_ODOO: ${{ secrets.EIS_API_KEY || secrets.APP_EIS_API_KEY || vars.EIS_API_KEY || vars.APP_EIS_API_KEY || 'dev-eis-key' }}
        run: |
          set -eu
          if [ ! -f ~/.ssh/id_vps ]; then
            echo "::error::Нет ~/.ssh/id_vps — задайте secret VPS_SSH_KEY (то же, что туннель к БД)"
            exit 1
          fi
          export ODOO_DATABASE_NAME="${{ vars.ODOO_DATABASE_NAME }}"
          chmod +x infra/odoo-vps/deploy-odoo-vps.sh
          ./infra/odoo-vps/deploy-odoo-vps.sh

      - name: Upload bundle to server
        run: |
          set -eu
          echo "## Upload JAR, app.env, appctl.sh → ~/apps/blps"
          APP_DIR="~/apps/blps"
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "mkdir -p ${APP_DIR}"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "artifact/${{ env.JAR_NAME }}" \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/app.jar"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            app.env \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/app.env"

          scp -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            infra/appctl.sh \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${APP_DIR}/appctl.sh"

          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "chmod +x ${APP_DIR}/appctl.sh"
          echo "Upload main app done."

      - name: Ensure reverse SSH tunnels from VPS to helios
        if: ${{ env.VPS_DEPLOY_HOST }}
        run: |
          set -eu
          echo "## Reverse SSH: на VPS: ssh -f -N -i key -p <helios ssh> -R … user@helios (см. HELIOS_TUNNEL_SSH_*, HELIOS_KAFKA_TUNNEL_PORT, VPS_HELIOS_TUNNEL_EXTRA_R)"
          if [ ! -f helios_tunnel_key ] || [ ! -s helios_tunnel_key ] || [ ! -f ~/.ssh/id_vps ]; then
            echo "Skip: положи secret HELIOS_TUNNEL_PRIVATE_KEY и VPS_SSH_KEY, перезапусти prepare id_vps (или вручную: ssh -f -N …)"
            exit 0
          fi
          HELIOS_TH="${{ vars.HELIOS_TUNNEL_SSH_HOST }}"
          HELIOS_TP="${{ vars.HELIOS_TUNNEL_SSH_PORT }}"
          HELIOS_TU="${{ vars.HELIOS_TUNNEL_SSH_USER }}"
          if [ -z "$HELIOS_TH" ]; then HELIOS_TH="${{ env.SSH_HOST }}"; fi
          if [ -z "$HELIOS_TP" ]; then HELIOS_TP="${{ env.SSH_PORT }}"; fi
          if [ -z "$HELIOS_TU" ]; then HELIOS_TU="${{ env.SSH_USER }}"; fi
          KTP="${{ vars.HELIOS_KAFKA_TUNNEL_PORT }}"
          if [ -z "$KTP" ]; then KTP=9092; fi
          REMOTE_DB_HOST="${{ vars.DB_TUNNEL_REMOTE_HOST }}"
          [ -z "$REMOTE_DB_HOST" ] && REMOTE_DB_HOST=127.0.0.1
          REMOTE_DB_PORT="${{ vars.DB_TUNNEL_REMOTE_PORT }}"
          [ -z "$REMOTE_DB_PORT" ] && REMOTE_DB_PORT=5432
          DB_PORT="${{ vars.POSTGRES_PORT }}"
          [ -z "$DB_PORT" ] && DB_PORT=15432
          REV_ARGS=""
          if [ "${{ vars.POSTGRES_HOST }}" = "127.0.0.1" ] || [ "${{ vars.POSTGRES_HOST }}" = "localhost" ]; then
            REV_ARGS="${REV_ARGS} -R ${DB_PORT}:${REMOTE_DB_HOST}:${REMOTE_DB_PORT}"
            echo "  -R (Postgres) helios:${DB_PORT} -> VPS ${REMOTE_DB_HOST}:${REMOTE_DB_PORT}"
          fi
          if [ "${{ vars.SKIP_NATIVE_STACK }}" != "true" ] && [ "${{ vars.SKIP_NATIVE_STACK }}" != "1" ]; then
            REV_ARGS="${REV_ARGS} -R ${KTP}:127.0.0.1:9092"
            echo "  -R (Kafka) helios:${KTP} -> VPS 127.0.0.1:9092"
          fi
          EXTRA="${{ vars.VPS_HELIOS_TUNNEL_EXTRA_R }}"
          if [ -n "$EXTRA" ]; then
            OLDIFS=$IFS
            IFS=';'
            for spec in $EXTRA; do
              spec="${spec#"${spec%%[![:space:]]*}"}"
              spec="${spec%"${spec##*[![:space:]]}"}"
              if [ -n "$spec" ]; then
                REV_ARGS="${REV_ARGS} -R ${spec}"
                echo "  -R (extra) $spec"
              fi
            done
            IFS=$OLDIFS
          fi
          if [ -z "$REV_ARGS" ]; then
            echo "Нет -R: настройте POSTGRES_HOST, выключите SKIP_NATIVE_STACK, или задайте VPS_HELIOS_TUNNEL_EXTRA_R"
            exit 0
          fi
          if [ -z "$HELIOS_TH" ] || [ -z "${{ env.VPS_DEPLOY_USER }}" ] || [ -z "${{ env.VPS_DEPLOY_HOST }}" ]; then
            echo "::error::VPS_*, SSH/HELIOS host пусто"
            exit 1
          fi
          VPS_PORT="${{ env.VPS_DEPLOY_PORT }}"
          VUSER="${{ env.VPS_DEPLOY_USER }}"
          VHOST="${{ env.VPS_DEPLOY_HOST }}"
          scp -P "$VPS_PORT" -i ~/.ssh/id_vps helios_tunnel_key "${VUSER}@${VHOST}:/tmp/helios_tunnel_key_ci"
          echo "VPS: ssh -f -N … ${HELIOS_TU}@${HELIOS_TH} -p ${HELIOS_TP} $REV_ARGS"
          REMOTE_STEPS="set -e; \
            install -d -m 700 ~/.ssh; \
            mv -f /tmp/helios_tunnel_key_ci ~/.ssh/helios_tunnel_key; chmod 600 ~/.ssh/helios_tunnel_key; \
            ssh-keyscan -p $HELIOS_TP -H $HELIOS_TH >> ~/.ssh/known_hosts 2>/dev/null || true; \
            pkill -f 'helios_tunnel_key' 2>/dev/null || true; \
            ssh -f -N -i ~/.ssh/helios_tunnel_key -p $HELIOS_TP -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 $REV_ARGS $HELIOS_TU@$HELIOS_TH"
          # shellcheck disable=SC2029
          ssh -p "$VPS_PORT" -i ~/.ssh/id_vps -o BatchMode=yes "$VUSER@$VHOST" "$REMOTE_STEPS"
          echo "Check listeners on helios (runner has id_key)…"
          sleep 2
          if [ "${{ vars.POSTGRES_HOST }}" = "127.0.0.1" ] || [ "${{ vars.POSTGRES_HOST }}" = "localhost" ]; then
            if ssh -p "$HELIOS_TP" -i ~/.ssh/id_key -o ConnectTimeout=5 -o BatchMode=yes "$HELIOS_TU@$HELIOS_TH" "nc -z 127.0.0.1 $DB_PORT" 2>/dev/null; then
              echo "OK tunnel Postgres on helios: $DB_PORT"
            else
              echo "::warning::helios:127.0.0.1:$DB_PORT not open (Postgres?)"
            fi
          fi
          if [ "${{ vars.SKIP_NATIVE_STACK }}" != "true" ] && [ "${{ vars.SKIP_NATIVE_STACK }}" != "1" ]; then
            if ssh -p "$HELIOS_TP" -i ~/.ssh/id_key -o ConnectTimeout=5 -o BatchMode=yes "$HELIOS_TU@$HELIOS_TH" "nc -z 127.0.0.1 $KTP" 2>/dev/null; then
              echo "OK tunnel Kafka on helios: $KTP"
            else
              echo "::warning::helios:127.0.0.1:$KTP not open (Kafka?)"
            fi
          fi
          echo "Reverse SSH done."

      - name: Restart service on server
        run: |
          set -eu
          echo "## Restart Spring Boot (API)"
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cd \$HOME/apps/blps && ./appctl.sh restart"

      - name: Healthcheck
        run: |
          set -eu
          TIMEOUT_SEC="${API_HEALTHCHECK_TIMEOUT_SEC}"
          echo "## API TCP on stack (localhost, SERVER_PORT) — timeout ${TIMEOUT_SEC}s (vars.API_HEALTHCHECK_TIMEOUT_SEC)"
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          echo "Waiting for 127.0.0.1:${PORT} (max ~${TIMEOUT_SEC}s)..."
          if ! ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=5 -o BatchMode=yes \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "env bash -c 'i=0; while [ \$i -lt ${TIMEOUT_SEC} ]; do nc -z 127.0.0.1 ${PORT} && exit 0; sleep 1; i=\$((i+1)); done; exit 1'"; then
            echo "::error::Nothing listening on stack host 127.0.0.1:${PORT} — check app.log on server"
            exit 1
          fi
          echo "TCP OK on port ${PORT}"

      - name: Run deployed API tests via SSH tunnel
        if: ${{ vars.CI_SKIP_TESTS != 'true' && vars.CI_SKIP_TESTS != '1' }}
        run: |
          set -eu
          TIMEOUT_SEC="${API_HEALTHCHECK_TIMEOUT_SEC}"
          echo "## Deployed API tests (SSH -L to actuator, then test/test.py) — health wait ${TIMEOUT_SEC}s"
          PORT="${{ vars.SERVER_PORT }}"
          [ -z "$PORT" ] && PORT=8080
          LOCAL_PORT=18080

          ssh -N \
            -L ${LOCAL_PORT}:127.0.0.1:${PORT} \
            -p "${{ env.SSH_PORT }}" \
            -i ~/.ssh/id_key \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" &
          TUNNEL_PID=$!
          trap 'kill ${TUNNEL_PID} 2>/dev/null || true' EXIT

          READY=0
          for i in $(seq 1 "${TIMEOUT_SEC}"); do
            if curl -fsS -o /dev/null "http://127.0.0.1:${LOCAL_PORT}/actuator/health"; then
              echo "Forwarded /actuator/health OK (${i}/${TIMEOUT_SEC})."
              READY=1
              break
            fi
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              echo "  ... waiting tunnel+app (${i}/${TIMEOUT_SEC})"
            fi
            sleep 1
          done
          [ "$READY" = "1" ] || { echo "::error::Health via SSH forward failed — tunnel or app down"; exit 1; }

          export BASE_URL="http://127.0.0.1:${LOCAL_PORT}"
          export REQUEST_TIMEOUT=60

          ADMIN_EMAIL_VALUE="${{ vars.ADMIN_EMAIL }}"
          [ -n "$ADMIN_EMAIL_VALUE" ] && export ADMIN_EMAIL="$ADMIN_EMAIL_VALUE"

          ADMIN_PASSWORD_VALUE="${{ secrets.ADMIN_PASSWORD }}"
          [ -z "$ADMIN_PASSWORD_VALUE" ] && ADMIN_PASSWORD_VALUE="${{ vars.ADMIN_PASSWORD }}"
          [ -n "$ADMIN_PASSWORD_VALUE" ] && export ADMIN_PASSWORD="$ADMIN_PASSWORD_VALUE"

          RECRUITER_EMAIL_VALUE="${{ vars.RECRUITER_EMAIL }}"
          [ -n "$RECRUITER_EMAIL_VALUE" ] && export RECRUITER_EMAIL="$RECRUITER_EMAIL_VALUE"

          RECRUITER_PASSWORD_VALUE="${{ secrets.RECRUITER_PASSWORD }}"
          [ -z "$RECRUITER_PASSWORD_VALUE" ] && RECRUITER_PASSWORD_VALUE="${{ vars.RECRUITER_PASSWORD }}"
          [ -n "$RECRUITER_PASSWORD_VALUE" ] && export RECRUITER_PASSWORD="$RECRUITER_PASSWORD_VALUE"

          CANDIDATE_PASSWORD_VALUE="${{ secrets.CANDIDATE_PASSWORD }}"
          [ -z "$CANDIDATE_PASSWORD_VALUE" ] && CANDIDATE_PASSWORD_VALUE="${{ vars.CANDIDATE_PASSWORD }}"
          [ -n "$CANDIDATE_PASSWORD_VALUE" ] && export CANDIDATE_PASSWORD="$CANDIDATE_PASSWORD_VALUE"

          APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE="${{ vars.APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS }}"
          [ -n "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" ] && export APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS="$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE"
          if [ -n "${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-}" ]; then
            export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS
          elif [ -n "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" ]; then
            case "$(echo "$APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS_VALUE" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on) export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=1 ;;&
              *) export TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=0 ;;&
            esac
          fi

          echo "Timeout debug flags: APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${APP_TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-} TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS=${TIMEOUT_DEBUG_DISABLE_NOTIFICATIONS:-}"
          python test/test.py
          echo "API tests finished."


      - name: Fetch app.log from server
        if: always()
        run: |
          echo "## Fetch ~/apps/blps/app.log (for artifact)"
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_key -o ConnectTimeout=10 \
            "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "cat ~/apps/blps/app.log 2>/dev/null || echo '(app.log not found or empty)'" > app.log 2>/dev/null || true
          test -f app.log || echo "app.log not available" > app.log

      - name: Upload app.log artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-log-${{ github.run_id }}
          path: app.log

  # Screening worker: single JAR on a separate node from API/Kafka (WORKER_SSH_* in env: secrets, else vars).
  deploy-worker:
    needs: [build, deploy]
    if: ${{ always() && !cancelled() && needs.build.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      JAR_NAME: ${{ needs.build.outputs.jar_name }}
      SSH_KEY: ${{ secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      # Kafka на VPS: fallback для STACK_HOST в worker (если нет vars.STACK_HOST)
      VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST || vars.VPS_SSH_HOST }}
      WORKER_SSH_HOST: ${{ secrets.WORKER_SSH_HOST || vars.WORKER_SSH_HOST }}
      WORKER_SSH_USER: ${{ secrets.WORKER_SSH_USER || vars.WORKER_SSH_USER }}
      WORKER_SSH_PORT: ${{ secrets.WORKER_SSH_PORT || vars.WORKER_SSH_PORT }}
      WORKER_SSH_KEY: ${{ secrets.WORKER_SSH_KEY || vars.WORKER_SSH_KEY }}
      API_HEALTHCHECK_TIMEOUT_SEC: ${{ vars.API_HEALTHCHECK_TIMEOUT_SEC || '60' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            infra/appctl.sh
            infra/ci/render_worker_env.py
            infra/stack/kafka-ui-ctl.sh
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: jar
          path: artifact

      - name: Render worker.env
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
          WORKER_SERVER_PORT: ${{ vars.WORKER_SERVER_PORT || '8082' }}
        run: |
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "${STACK_HOST}" ] && [ -n "${{ env.VPS_SSH_HOST }}" ]; then STACK_HOST="${{ env.VPS_SSH_HOST }}"; fi
          if [ -z "${STACK_HOST}" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          export STACK_HOST
          export STACK_KAFKA_PORT="${{ vars.STACK_KAFKA_PORT }}"
          export STACK_POSTGRES_PORT="${{ vars.STACK_POSTGRES_PORT }}"
          python infra/ci/render_worker_env.py

      - name: Prepare SSH
        run: |
          set -eu
          RUSER="${{ env.WORKER_SSH_USER }}"
          RHOST="${{ env.WORKER_SSH_HOST }}"
          if [ -z "$RUSER" ] || [ -z "$RHOST" ]; then
            echo "::error::Worker SSH: set WORKER_SSH_HOST and WORKER_SSH_USER (repository secrets or variables)."
            exit 1
          fi
          echo "WORKER_SSH_TARGET=${RUSER}@${RHOST}" >> "$GITHUB_ENV"
          echo "## Worker — SSH (${RUSER}@${RHOST})"
          mkdir -p ~/.ssh
          if [ -n "${{ env.WORKER_SSH_KEY }}" ]; then
            echo "${{ env.WORKER_SSH_KEY }}" > ~/.ssh/id_worker
          else
            echo "${{ env.SSH_KEY }}" > ~/.ssh/id_worker
          fi
          chmod 600 ~/.ssh/id_worker
          WPORT="${{ env.WORKER_SSH_PORT }}"
          [ -z "$WPORT" ] && WPORT=22
          echo "WORKER_SSH_PORT=$WPORT" >> "$GITHUB_ENV"
          ssh-keyscan -p "$WPORT" -H "$RHOST" >> ~/.ssh/known_hosts

      - name: Stop worker services before deploy
        run: |
          set -eu
          WPORT="${{ env.WORKER_SSH_PORT }}"
          REM="${{ env.WORKER_SSH_TARGET }}"
          echo "## Pre-deploy worker: stop API, Kafka UI, Kafka (frees RAM/ports; missing scripts are OK)"
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" \
            "env bash -c 'set +e; \
            if [ -f \"\$HOME/apps/blps/appctl.sh\" ]; then echo \"Stopping worker app...\"; bash \"\$HOME/apps/blps/appctl.sh\" stop; else echo \"No appctl — skip\"; fi; \
            if [ -f \"\$HOME/hh-process/stack/kafka-ui-ctl.sh\" ]; then echo \"Stopping Kafka UI...\"; bash \"\$HOME/hh-process/stack/kafka-ui-ctl.sh\" stop; fi; \
            if [ -f \"\$HOME/hh-process/stack/kafka-ctl.sh\" ]; then echo \"Stopping Kafka...\"; bash \"\$HOME/hh-process/stack/kafka-ctl.sh\" stop; fi; \
            echo \"Worker pre-deploy stop done.\"'"
          sleep 2

      - name: Upload bundle to worker
        run: |
          set -eu
          echo "## Worker — upload JAR + env + appctl"
          test -n "${{ env.WORKER_SSH_TARGET }}"
          test -n "${{ env.JAR_NAME }}"
          RJAR="artifact/${{ env.JAR_NAME }}"
          test -f "$RJAR" || { echo "::error::Missing $RJAR (artifact download / JAR_NAME)"; exit 1; }
          WPORT="${{ env.WORKER_SSH_PORT }}"
          REM="${{ env.WORKER_SSH_TARGET }}"
          REMOTE_HOME="$(ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes -o ConnectTimeout=30 "$REM" 'printf %s "$HOME"')"
          test -n "$REMOTE_HOME" || { echo "::error::remote HOME empty"; exit 1; }
          echo "REMOTE_HOME=${REMOTE_HOME}"
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "mkdir -p \"${REMOTE_HOME}/apps/blps\""
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "rm -f \"${REMOTE_HOME}/apps/blps/app.jar.new\""
          # Без scp/SFTP: у части хостов (квота, sshd) dest open по SFTP падает, тот же путь через shell нормальный.
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "df -h \"${REMOTE_HOME}\" 2>/dev/null | tail -5 || true"
          if ! ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "cat > \"${REMOTE_HOME}/apps/blps/app.jar.new\"" < "$RJAR"; then
            echo "::error::JAR stream failed — на воркере: quota -s, df -h, ls -la ~/apps/blps (отдельная квота у studs, не как у основного пользователя)"
            exit 1
          fi
          if ! ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "cat > \"${REMOTE_HOME}/apps/blps/app.env\"" < worker.env; then
            echo "::error::app.env upload failed"; exit 1
          fi
          if ! ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "cat > \"${REMOTE_HOME}/apps/blps/appctl.sh\"" < infra/appctl.sh; then
            echo "::error::appctl.sh upload failed"; exit 1
          fi
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "mv -f \"${REMOTE_HOME}/apps/blps/app.jar.new\" \"${REMOTE_HOME}/apps/blps/app.jar\" && chmod +x \"${REMOTE_HOME}/apps/blps/appctl.sh\""

      - name: Restart worker
        run: |
          set -eu
          WPORT="${{ env.WORKER_SSH_PORT }}"
          REM="${{ env.WORKER_SSH_TARGET }}"
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "env bash -c 'cd \"\$HOME/apps/blps\" && ./appctl.sh restart'"

      - name: Healthcheck worker
        run: |
          set -eu
          WPORT="${{ env.WORKER_SSH_PORT }}"
          REM="${{ env.WORKER_SSH_TARGET }}"
          TIMEOUT_SEC="${{ env.API_HEALTHCHECK_TIMEOUT_SEC }}"
          APP_PORT="${{ vars.WORKER_SERVER_PORT || '8082' }}"
          echo "## Worker — /actuator/health on 127.0.0.1:${APP_PORT} (max ~${TIMEOUT_SEC}s; vars.WORKER_SERVER_PORT, default 8082)"
          if ! ssh -p "$WPORT" -i ~/.ssh/id_worker -o ConnectTimeout=5 -o BatchMode=yes "$REM" \
            "env APP_PORT=${APP_PORT} TIMEOUT_SEC=${TIMEOUT_SEC} bash -c 'i=0; while [ \$i -lt \$TIMEOUT_SEC ]; do (curl -fsS -o /dev/null http://127.0.0.1:\$APP_PORT/actuator/health 2>/dev/null || wget -qO /dev/null http://127.0.0.1:\$APP_PORT/actuator/health 2>/dev/null) && exit 0; sleep 1; i=\$((i+1)); done; exit 1'"; then
            echo "::error::Worker /actuator/health failed — check ~/apps/blps/app.log on worker host"
            exit 1
          fi
          echo "Worker health OK."

      # kafbat Kafka UI (JAR) on worker; bootstrap = stack broker (same as worker.env KAFKA_BOOTSTRAP_SERVERS).
      - name: Kafka UI (kafbat) on worker host
        if: ${{ vars.SKIP_KAFKA_UI != 'true' && vars.SKIP_KAFKA_UI != '1' }}
        env:
          KAFKA_UI_PORT: ${{ vars.KAFKA_UI_PORT || '8081' }}
          KAFKA_UI_VERSION: ${{ vars.KAFKA_UI_VERSION || '1.4.2' }}
        run: |
          set -eu
          echo "## Kafka UI (kafbat) on worker — JAR from GitHub; default version 1.4.2 (override: KAFKA_UI_VERSION); skip: SKIP_KAFKA_UI"
          STACK_HOST="${{ vars.STACK_HOST }}"
          if [ -z "$STACK_HOST" ] && [ -n "${{ env.VPS_SSH_HOST }}" ]; then STACK_HOST="${{ env.VPS_SSH_HOST }}"; fi
          if [ -z "$STACK_HOST" ]; then STACK_HOST="${{ env.SSH_HOST }}"; fi
          KPORT="${{ vars.STACK_KAFKA_PORT }}"
          [ -z "$KPORT" ] && KPORT=9092
          KAFKA_UI_BOOTSTRAP="${STACK_HOST}:${KPORT}"
          echo "KAFKA_UI_BOOTSTRAP=${KAFKA_UI_BOOTSTRAP}"
          case "${STACK_HOST}" in
            localhost|127.0.0.1|::1)
              echo "::warning::STACK_HOST is ${STACK_HOST} — broker is not on worker localhost; set vars.STACK_HOST to the stack host/IP."
              ;;
          esac
          WPORT="${{ env.WORKER_SSH_PORT }}"
          REM="${{ env.WORKER_SSH_TARGET }}"
          REMOTE_HOME="$(ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes -o ConnectTimeout=30 "$REM" 'printf %s "$HOME"')"
          test -n "$REMOTE_HOME"
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "mkdir -p \"${REMOTE_HOME}/hh-process/stack\""
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" "cat > \"${REMOTE_HOME}/hh-process/stack/kafka-ui-ctl.sh\"" < infra/stack/kafka-ui-ctl.sh
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" \
            "env bash -c 'chmod +x \"\$HOME/hh-process/stack/kafka-ui-ctl.sh\"'"
          ssh -p "$WPORT" -i ~/.ssh/id_worker -o BatchMode=yes "$REM" \
            "env bash -c 'export KAFKA_UI_PORT=\"${KAFKA_UI_PORT}\" KAFKA_UI_VERSION=\"${KAFKA_UI_VERSION}\" KAFKA_UI_BOOTSTRAP=\"${KAFKA_UI_BOOTSTRAP}\" && \"\$HOME/hh-process/stack/kafka-ui-ctl.sh\" restart'"
          echo "Healthcheck: Kafka UI TCP on worker 127.0.0.1:${KAFKA_UI_PORT} (max ~45s; first run downloads JAR ~130MB)..."
          if ! ssh -p "$WPORT" -i ~/.ssh/id_worker -o ConnectTimeout=5 -o BatchMode=yes "$REM" \
            "env bash -c 'i=0; while [ \$i -lt 22 ]; do nc -z 127.0.0.1 ${KAFKA_UI_PORT} && exit 0; sleep 2; i=\$((i+1)); done; exit 1'"; then
            echo "::warning::Kafka UI: port ${KAFKA_UI_PORT} not open on worker — see ~/hh-process/kafka-ui.log"
          else
            echo "Kafka UI OK on worker (port ${KAFKA_UI_PORT})."
          fi
